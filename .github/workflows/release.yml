name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -e ".[dev]"
      - name: Lint, type-check, and test
        run: |
          . .venv/bin/activate
          ruff check src/ tests/
          mypy src/
          pytest --cov=miller --cov-report=xml --cov-report=json --cov-report=term-missing --cov-fail-under=90 tests/
      - name: Enforce branch coverage on selector/validation
        run: |
          . .venv/bin/activate
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("coverage.json").read_text(encoding="utf-8"))
          required = ["src/miller/selector.py", "src/miller/validation.py"]
          failures = []
          for filename in required:
              summary = report["files"][filename]["summary"]
              if summary["covered_branches"] != summary["num_branches"]:
                  failures.append(
                      f"{filename}: {summary['covered_branches']}/{summary['num_branches']} branches covered"
                  )
          if failures:
              raise SystemExit("Branch coverage requirement failed:\n" + "\n".join(failures))
          PY

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t miller .
      - name: Run tests in container
        run: docker run --entrypoint pytest miller --cov=miller --cov-fail-under=90 tests/
      - name: Verify help
        run: docker run miller --help

  build-and-publish:
    runs-on: ubuntu-latest
    needs: [test, docker-build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build packages
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Build docker image
        run: |
          VERSION=${GITHUB_REF_NAME}
          docker build -t ghcr.io/${{ github.repository }}:${VERSION} .
          docker tag ghcr.io/${{ github.repository }}:${VERSION} ghcr.io/${{ github.repository }}:latest
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push docker image
        run: |
          VERSION=${GITHUB_REF_NAME}
          docker push ghcr.io/${{ github.repository }}:${VERSION}
          docker push ghcr.io/${{ github.repository }}:latest
      - name: Upload python artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*
      - name: Attach artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
